<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Drift — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 {
            font-size: 16px; font-weight: 600; color: var(--anthropic-dark);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before { content: '\2022'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217,119,87,.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange);
            border-radius: 50%; cursor: pointer; transition: all 0.2s ease;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer;
        }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button {
            background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px;
            border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s ease; width: 100%;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container {
            width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: white;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); padding: 200px 0; }
        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Memory Drift</h1>
            <div class="subtitle">Reconstruction and temporal flow. Fragments of memory drift, converge, and reform — an algorithmic meditation on what it means to remember.</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">&larr; Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next &rarr;</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">&#8635; Random</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>Particle Density</label>
                    <div class="slider-container">
                        <input type="range" id="particleDensity" min="800" max="6000" step="200" value="3000" oninput="updateParam('particleDensity', this.value)">
                        <span class="value-display" id="particleDensity-value">3000</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="driftSpeed" min="0.2" max="2.0" step="0.1" value="0.7" oninput="updateParam('driftSpeed', this.value)">
                        <span class="value-display" id="driftSpeed-value">0.7</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Memory Depth</label>
                    <div class="slider-container">
                        <input type="range" id="memoryDepth" min="0.001" max="0.012" step="0.001" value="0.004" oninput="updateParam('memoryDepth', this.value)">
                        <span class="value-display" id="memoryDepth-value">0.004</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Convergence</label>
                    <div class="slider-container">
                        <input type="range" id="convergence" min="0.0" max="1.0" step="0.05" value="0.35" oninput="updateParam('convergence', this.value)">
                        <span class="value-display" id="convergence-value">0.35</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Flicker Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="flickerIntensity" min="0.0" max="1.0" step="0.05" value="0.4" oninput="updateParam('flickerIntensity', this.value)">
                        <span class="value-display" id="flickerIntensity-value">0.4</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Trail Persistence</label>
                    <div class="slider-container">
                        <input type="range" id="trailPersistence" min="1" max="30" step="1" value="12" oninput="updateParam('trailPersistence', this.value)">
                        <span class="value-display" id="trailPersistence-value">12</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Warm / Recent Memory</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#c4854a" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#c4854a</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Cool / Distant Memory</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#4a6a8c" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#4a6a8c</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Patina / Mid-register</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#7a8a6a" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#7a8a6a</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row" style="margin-bottom:8px">
                    <button class="button" onclick="regenerate()">Regenerate</button>
                    <button class="button secondary" onclick="resetParameters()">Reset</button>
                </div>
                <button class="button tertiary" onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing Memory Drift...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // MEMORY DRIFT — Parameters
        // ═══════════════════════════════════════════════════════════════

        let params = {
            seed: 42,
            particleDensity: 3000,
            driftSpeed: 0.7,
            memoryDepth: 0.004,
            convergence: 0.35,
            flickerIntensity: 0.4,
            trailPersistence: 12,
            colorPalette: ['#c4854a', '#4a6a8c', '#7a8a6a']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════════════════
        // MEMORY DRIFT — Core Algorithm
        // ═══════════════════════════════════════════════════════════════

        let particles = [];
        let attractors = [];
        let phaseOffset = 0;
        let frameCounter = 0;

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            colorMode(HSB, 360, 100, 100, 100);
            document.querySelector('.loading').style.display = 'none';
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            particles = [];
            attractors = [];
            phaseOffset = 0;
            frameCounter = 0;

            // Create attractor points — convergence nodes where memories gather
            let numAttractors = floor(random(3, 7));
            for (let i = 0; i < numAttractors; i++) {
                attractors.push({
                    x: random(width * 0.15, width * 0.85),
                    y: random(height * 0.15, height * 0.85),
                    strength: random(0.3, 1.0),
                    phase: random(TWO_PI),
                    freq: random(0.002, 0.008)
                });
            }

            // Spawn particles at edges and thresholds
            for (let i = 0; i < params.particleDensity; i++) {
                particles.push(new MemoryParticle(i));
            }

            background(16, 6, 97); // warm off-white
        }

        function draw() {
            // Slow fade — trails persist like afterimages
            noStroke();
            fill(16, 6, 97, 100 / params.trailPersistence);
            rect(0, 0, width, height);

            phaseOffset += 0.003;
            frameCounter++;

            // Update and draw all particles
            for (let p of particles) {
                p.update();
                p.display();
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // MEMORY PARTICLE — The fundamental unit of remembrance
        // ═══════════════════════════════════════════════════════════════

        class MemoryParticle {
            constructor(index) {
                this.index = index;
                this.spawn();
            }

            spawn() {
                // Born at edges — memory enters from the periphery
                let edge = floor(random(4));
                switch (edge) {
                    case 0: this.x = random(width); this.y = -5; break;
                    case 1: this.x = width + 5; this.y = random(height); break;
                    case 2: this.x = random(width); this.y = height + 5; break;
                    case 3: this.x = -5; this.y = random(height); break;
                }
                this.vx = 0;
                this.vy = 0;
                this.age = 0;
                this.maxAge = random(300, 1200);
                this.size = random(0.8, 2.8);
                this.noiseOffsetX = random(10000);
                this.noiseOffsetY = random(10000);

                // Color determined by birth — warm (recent) vs cool (distant)
                this.temperatureRatio = random(1);
            }

            update() {
                this.age++;

                // Dual-layer flow field
                // Layer 1: Deep memory — slow, geological drift
                let deepAngle = noise(
                    this.x * params.memoryDepth,
                    this.y * params.memoryDepth,
                    phaseOffset * 0.3
                ) * TWO_PI * 2.5;

                // Layer 2: Personal flicker — fast, volatile
                let flickerAngle = noise(
                    this.x * params.memoryDepth * 4 + 500,
                    this.y * params.memoryDepth * 4 + 500,
                    phaseOffset * 2.0 + this.noiseOffsetX
                ) * TWO_PI * 3;

                // Blend layers
                let blendedAngle = deepAngle + flickerAngle * params.flickerIntensity * 0.5;

                let fx = cos(blendedAngle) * params.driftSpeed;
                let fy = sin(blendedAngle) * params.driftSpeed;

                // Attractor influence — convergence toward memory nodes
                for (let a of attractors) {
                    let dx = a.x - this.x;
                    let dy = a.y - this.y;
                    let dist = sqrt(dx * dx + dy * dy);
                    if (dist < 300 && dist > 5) {
                        // Pulsing attraction
                        let pulse = sin(phaseOffset * 60 * a.freq + a.phase) * 0.5 + 0.5;
                        let force = (a.strength * params.convergence * pulse) / (dist * 0.08);
                        fx += (dx / dist) * force;
                        fy += (dy / dist) * force;
                    }
                }

                // Apply forces with gentle damping
                this.vx = this.vx * 0.92 + fx * 0.08;
                this.vy = this.vy * 0.92 + fy * 0.08;
                this.x += this.vx;
                this.y += this.vy;

                // Respawn if out of bounds or aged out
                if (this.age > this.maxAge || this.x < -20 || this.x > width + 20 || this.y < -20 || this.y > height + 20) {
                    this.spawn();
                }
            }

            display() {
                let speed = sqrt(this.vx * this.vx + this.vy * this.vy);
                let lifeFraction = this.age / this.maxAge;

                // Color: warm for fast/young, cool for slow/old
                let warmCol = hexToHSB(params.colorPalette[0]);
                let coolCol = hexToHSB(params.colorPalette[1]);
                let midCol = hexToHSB(params.colorPalette[2]);

                let colorT = constrain(map(speed, 0, params.driftSpeed * 1.5, 1, 0), 0, 1);
                // Blend warm -> mid -> cool based on velocity
                let h, s, b;
                if (colorT < 0.5) {
                    let t = colorT * 2;
                    h = lerp(warmCol.h, midCol.h, t);
                    s = lerp(warmCol.s, midCol.s, t);
                    b = lerp(warmCol.b, midCol.b, t);
                } else {
                    let t = (colorT - 0.5) * 2;
                    h = lerp(midCol.h, coolCol.h, t);
                    s = lerp(midCol.s, coolCol.s, t);
                    b = lerp(midCol.b, coolCol.b, t);
                }

                // Opacity: fade in, sustain, fade out
                let alpha;
                if (lifeFraction < 0.05) {
                    alpha = map(lifeFraction, 0, 0.05, 0, 50);
                } else if (lifeFraction > 0.85) {
                    alpha = map(lifeFraction, 0.85, 1, 50, 0);
                } else {
                    alpha = 30 + speed * 15;
                }
                alpha = constrain(alpha, 0, 65);

                noStroke();
                fill(h, s, b, alpha);
                let sz = this.size * (1 + speed * 0.3);
                ellipse(this.x, this.y, sz, sz);

                // Occasional bright flash — a memory surfacing
                if (speed > params.driftSpeed * 1.2 && random() < 0.02) {
                    fill(h, s * 0.3, 100, 20);
                    ellipse(this.x, this.y, sz * 3, sz * 3);
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // UTILITY
        // ═══════════════════════════════════════════════════════════════

        function hexToHSB(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            let mx = Math.max(r, g, b), mn = Math.min(r, g, b);
            let h = 0, s, v = mx;
            let d = mx - mn;
            s = mx === 0 ? 0 : d / mx;
            if (mx !== mn) {
                switch (mx) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: h * 360, s: s * 100, b: v * 100 };
        }

        // ═══════════════════════════════════════════════════════════════
        // UI HANDLERS
        // ═══════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;
            // Some params need full regen
            if (paramName === 'particleDensity') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function regenerate() {
            initializeSystem();
        }

        function downloadPNG() {
            saveCanvas('memory-drift-' + params.seed, 'png');
        }

        // ═══════════════════════════════════════════════════════════════
        // SEED CONTROLS
        // ═══════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('particleDensity').value = params.particleDensity;
            document.getElementById('particleDensity-value').textContent = params.particleDensity;
            document.getElementById('driftSpeed').value = params.driftSpeed;
            document.getElementById('driftSpeed-value').textContent = params.driftSpeed;
            document.getElementById('memoryDepth').value = params.memoryDepth;
            document.getElementById('memoryDepth-value').textContent = params.memoryDepth;
            document.getElementById('convergence').value = params.convergence;
            document.getElementById('convergence-value').textContent = params.convergence;
            document.getElementById('flickerIntensity').value = params.flickerIntensity;
            document.getElementById('flickerIntensity-value').textContent = params.flickerIntensity;
            document.getElementById('trailPersistence').value = params.trailPersistence;
            document.getElementById('trailPersistence-value').textContent = params.trailPersistence;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
